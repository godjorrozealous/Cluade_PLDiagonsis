services:
  lightning-service:
    build: ./mcp-services/lightning-service
    ports:
      - "8001:8001"
    environment:
      - PORT=8001

  icing-service:
    build: ./mcp-services/icing-service
    ports:
      - "8002:8002"
    environment:
      - PORT=8002

  wind-service:
    build: ./mcp-services/wind-service
    ports:
      - "8003:8003"
    environment:
      - PORT=8003

  bird-service:
    build: ./mcp-services/bird-service
    ports:
      - "8004:8004"
    environment:
      - PORT=8004

  weather-service:
    build: ./mcp-services/weather-service
    ports:
      - "8005:8005"
    environment:
      - PORT=8005

  pldiagnosis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pldiagnosis
    ports:
      - "5000:5000"
    environment:
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
      - LOG_LEVEL=INFO
      - LIGHTNING_URL=http://lightning-service:8001
      - ICING_URL=http://icing-service:8002
      - WIND_URL=http://wind-service:8003
      - BIRD_URL=http://bird-service:8004
      - WEATHER_URL=http://weather-service:8005
      # LLM 配置（根据实际环境修改）
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_TEMPERATURE=0.3
    volumes:
      - ./config:/app/config:ro
      - ./templates:/app/templates:ro
    restart: unless-stopped
    depends_on:
      - lightning-service
      - icing-service
      - wind-service
      - bird-service
      - weather-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
