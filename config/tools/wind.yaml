tool:
  name: "WindDiagnosisTool"
  display_name: "风偏分析"
  description: "查询线路走廊风速风向数据，分析风偏风险"
  category: "environmental"
  adapter:
    type: "mcp"
    config:
      mcp_server: "weather-mcp-server"
      tool_name: "query_wind"
      # 可选：配置真实 MCP 服务器 URL
      # 未配置时使用模拟数据（开发阶段）
      # mcp_server_url: "http://localhost:3003"
  output_schema:
    type: "structured"
    fields:
      - name: "max_wind_speed"
        type: "float"
        description: "最大风速(m/s)"
      - name: "wind_direction"
        type: "string"
        description: "风向"
      - name: "gust_speed"
        type: "float"
        description: "阵风速度(m/s)"
      - name: "deflection_risk"
        type: "string"
        description: "风偏风险等级"
  report_mapping:
    chapter: "诊断证据"
    render_template: "table"
