llm:
  provider: openai
  model: gpt-4o
  api_key: ${OPENAI_API_KEY}
  base_url: https://api.openai.com/v1
  temperature: 0.3
  max_tokens: 4096

intent_classification:
  confidence_threshold: 0.7
  fallback_intent: "general"

diagnosis:
  default_weights:
    LightningDiagnosisTool: 1.0
    IcingDiagnosisTool: 0.9
    WindDiagnosisTool: 0.8
    BirdDamageDiagnosisTool: 0.6
  weight_range:
    min: 0.1
    max: 2.0
  weight_step: 0.3
  tool_timeout: 30

report:
  templates_directory: templates
  default_template: standard_report.docx
  chapter_types:
    overview: { name: "概述", required: true }
    fault_analysis: { name: "故障分析", required: true }
    evidence: { name: "诊断证据", required: true }
    conclusion: { name: "诊断结论", required: true }
    recommendation: { name: "处理建议", required: true }
    history: { name: "历史对比", required: false }
    weather: { name: "气象数据", required: false }

session:
  max_sessions_per_user: 20
  session_ttl_hours: 48
  auto_cleanup: true

tools:
  config_directory: config/tools
  auto_load: true
